<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — grades.scotch.quest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
<style>

:root{--green:#39ff6e;--green-dim:#1a7a38;--green-faint:#0d3d1c;--green-pale:#a8ffbf;--bg:#050905;--bg2:#080f08;--bg3:#0e1a0e;--border:rgba(57,255,110,0.18);--border-hi:rgba(57,255,110,0.45);--red:#ff4444;--yellow:#ffd700;--cyan:#00ffe1;--amber:#ffb347;--text-dim:rgba(57,255,110,0.5)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scrollbar-width:thin;scrollbar-color:var(--green-dim) var(--bg)}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--green-dim);border-radius:3px}
body{background:var(--bg);color:var(--green);font-family:'Share Tech Mono',monospace;font-size:14px;min-height:100vh;overflow-x:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px)}
body::after{content:'';position:fixed;inset:0;z-index:9998;pointer-events:none;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.7) 100%)}
@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:.96}94%{opacity:1}96%{opacity:.98}97%{opacity:1}}
.crt{animation:flicker 8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.cursor{display:inline-block;animation:blink 1s step-end infinite}
@keyframes bootIn{0%{opacity:0}40%{opacity:0}100%{opacity:1}}
.shell{animation:bootIn .6s ease}
@keyframes rowIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.glow{text-shadow:0 0 8px var(--green),0 0 20px rgba(57,255,110,.3)}
/* TOPBAR */
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:48px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.topbar-left{display:flex;align-items:center;gap:20px}
.topbar-logo{font-family:'VT323',monospace;font-size:26px;color:var(--green);text-shadow:0 0 10px var(--green);text-decoration:none;letter-spacing:.04em}
.topbar-logo span{color:var(--cyan)}
.topbar-crumb{font-size:12px;color:var(--text-dim);display:flex;align-items:center;gap:6px}
.topbar-crumb a{color:var(--green-dim);text-decoration:none}
.topbar-crumb a:hover{color:var(--green)}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-time{font-size:12px;color:var(--text-dim)}
.topbar-user{font-size:12px;color:var(--green);display:flex;align-items:center;gap:8px;border:1px solid var(--border);padding:4px 12px;border-radius:4px;cursor:pointer;transition:border-color .2s;text-decoration:none}
.topbar-user:hover{border-color:var(--border-hi)}
.topbar-user .dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.notif-btn{font-size:11px;color:var(--text-dim);border:1px solid var(--border);padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .2s;text-decoration:none;position:relative}
.notif-btn:hover{border-color:var(--border-hi);color:var(--green)}
.notif-dot{position:absolute;top:-4px;right:-4px;width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 6px var(--red)}
/* HEADER */
.header-band{background:var(--bg2);border-bottom:1px solid var(--border);padding:20px 24px 18px}
.header-prompt{font-size:11px;color:var(--text-dim);margin-bottom:6px;letter-spacing:.1em}
.header-title{font-family:'VT323',monospace;font-size:36px;color:var(--green);text-shadow:0 0 16px var(--green),0 0 40px rgba(57,255,110,.2);letter-spacing:.04em;margin-bottom:14px}
.header-stats{display:flex;gap:0;flex-wrap:wrap}
.stat-block{padding:10px 24px 10px 0;margin-right:24px;border-right:1px solid var(--border)}
.stat-block:last-child{border-right:none}
.stat-val{font-family:'VT323',monospace;font-size:30px;line-height:1;color:var(--green);text-shadow:0 0 8px var(--green)}
.stat-val.warn{color:var(--yellow);text-shadow:0 0 8px var(--yellow)}
.stat-val.good{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
.stat-val.bad{color:var(--red);text-shadow:0 0 8px var(--red)}
.stat-label{font-size:10px;color:var(--text-dim);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
/* LAYOUT */
.body-grid{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 48px - 130px)}
/* SIDEBAR */
aside{background:rgba(8,15,8,.95);border-right:1px solid var(--border);padding:16px 0;position:sticky;top:48px;height:calc(100vh - 48px);overflow-y:auto}
.nav-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--green-dim);padding:14px 16px 6px}
.nav-label:first-child{padding-top:4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 16px;font-size:13px;color:var(--text-dim);text-decoration:none;transition:all .15s;border-left:2px solid transparent;white-space:nowrap}
.nav-item:hover{color:var(--green);background:var(--green-faint)}
.nav-item.active{color:var(--green);border-left-color:var(--green);background:var(--green-faint);text-shadow:0 0 6px var(--green)}
.nav-item .prefix{color:var(--green-dim)}
.nav-item .badge{margin-left:auto;font-size:9px;color:var(--bg);background:var(--green);padding:1px 6px;border-radius:3px;box-shadow:0 0 6px var(--green)}
.nav-item .badge.red{background:var(--red);box-shadow:0 0 6px var(--red)}
.nav-divider{height:1px;background:var(--border);margin:8px 16px}
/* MAIN */
main{padding:24px 28px;overflow-y:auto}
.cmd-line{font-size:13px;color:var(--text-dim);margin-bottom:18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cmd-line .prompt{color:var(--green)}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.sec-title::before{content:'//';color:var(--green-dim)}
.sec-btn{font-size:11px;color:var(--green-dim);background:none;border:1px solid var(--border);padding:4px 12px;border-radius:3px;cursor:pointer;font-family:'Share Tech Mono',monospace;transition:all .15s}
.sec-btn:hover{border-color:var(--border-hi);color:var(--green)}
/* TABLES */
.table-wrap{border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-bottom:24px}
table{width:100%;border-collapse:collapse}
thead tr{background:var(--bg3);border-bottom:1px solid var(--border)}
thead th{padding:10px 16px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);font-weight:400;text-align:left}
thead th.r{text-align:right}thead th.c{text-align:center}
tbody tr{border-bottom:1px solid rgba(57,255,110,.06);transition:background .15s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--green-faint)}
tbody tr:hover td{color:var(--green-pale)}
td{padding:12px 16px;color:var(--green);font-size:13px;vertical-align:middle}
td.r{text-align:right}td.c{text-align:center}td.dim{color:var(--text-dim)}
tbody tr td:first-child{position:relative;padding-left:20px}
tbody tr td:first-child::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px}
tbody tr.sg td:first-child::before{background:var(--green)}
tbody tr.sc td:first-child::before{background:var(--cyan)}
tbody tr.sy td:first-child::before{background:var(--yellow)}
tbody tr.sr td:first-child::before{background:var(--red)}
tbody tr.sa td:first-child::before{background:var(--amber)}
/* CARDS */
.card{border:1px solid var(--border);border-radius:6px;overflow:hidden;background:var(--bg2);margin-bottom:18px}
.card-header{background:var(--bg3);border-bottom:1px solid var(--border);padding:10px 16px;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);display:flex;align-items:center;justify-content:space-between}
.card-body{padding:4px 0}
/* LIST ROWS */
.list-row{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid rgba(57,255,110,.05);transition:background .15s;cursor:pointer}
.list-row:last-child{border-bottom:none}
.list-row:hover{background:var(--green-faint)}
.lrl{display:flex;flex-direction:column;gap:2px}
.lrn{font-size:13px;color:var(--green-pale)}
.lrs{font-size:10px;color:var(--text-dim);letter-spacing:.05em}
/* GRADE BADGES */
.gb{font-family:'VT323',monospace;font-size:22px;line-height:1;display:inline-block;width:36px;text-align:center}
.gb.A{color:var(--green);text-shadow:0 0 8px var(--green)}
.gb.B{color:var(--cyan);text-shadow:0 0 8px var(--cyan)}
.gb.C{color:var(--yellow);text-shadow:0 0 8px var(--yellow)}
.gb.D{color:var(--amber);text-shadow:0 0 8px var(--amber)}
.gb.F{color:var(--red);text-shadow:0 0 8px var(--red)}
/* BARS */
.bar-wrap{display:flex;align-items:center;gap:8px}
.bar-track{flex:1;height:4px;background:rgba(57,255,110,.1);border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px}
.bar-fill.A{background:var(--green);box-shadow:0 0 4px var(--green)}
.bar-fill.B{background:var(--cyan);box-shadow:0 0 4px var(--cyan)}
.bar-fill.C{background:var(--yellow);box-shadow:0 0 4px var(--yellow)}
.bar-fill.D{background:var(--amber);box-shadow:0 0 4px var(--amber)}
.bar-fill.F{background:var(--red);box-shadow:0 0 4px var(--red)}
/* PILLS */
.pill{display:inline-block;font-size:10px;padding:2px 10px;border-radius:3px;letter-spacing:.06em}
.pill.green{background:rgba(57,255,110,.12);color:var(--green);border:1px solid rgba(57,255,110,.25)}
.pill.yellow{background:rgba(255,215,0,.12);color:var(--yellow);border:1px solid rgba(255,215,0,.25)}
.pill.red{background:rgba(255,68,68,.12);color:var(--red);border:1px solid rgba(255,68,68,.25)}
.pill.cyan{background:rgba(0,255,225,.1);color:var(--cyan);border:1px solid rgba(0,255,225,.2)}
.pill.amber{background:rgba(255,179,71,.12);color:var(--amber);border:1px solid rgba(255,179,71,.25)}
/* PERIOD TAG */
.ptag{display:inline-block;font-size:10px;letter-spacing:.08em;border:1px solid var(--border);padding:2px 8px;border-radius:3px;color:var(--text-dim)}
/* FOOTER */
.footer-strip{border-top:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-dim)}
.footer-strip a{color:var(--green-dim);text-decoration:none}
.footer-strip a:hover{color:var(--green)}
.footer-links{display:flex;gap:18px}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border-hi);border-radius:8px;width:580px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:0 0 40px rgba(57,255,110,.1)}
.modal-head{background:var(--bg3);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0}
.modal-title{font-family:'VT323',monospace;font-size:22px;color:var(--green);text-shadow:0 0 8px var(--green)}
.modal-close{cursor:pointer;color:var(--text-dim);font-size:18px;background:none;border:none;font-family:'Share Tech Mono',monospace;transition:color .15s}
.modal-close:hover{color:var(--red)}
.modal-body{padding:18px 20px}


body{display:flex;align-items:center;justify-content:center}
.login-wrap{width:400px;max-width:95vw;border:1px solid var(--border-hi);border-radius:8px;overflow:hidden;box-shadow:0 0 60px rgba(57,255,110,.08)}
.login-head{background:var(--bg3);border-bottom:1px solid var(--border);padding:22px 26px}
.login-logo{font-family:'VT323',monospace;font-size:34px;color:var(--green);text-shadow:0 0 14px var(--green)}
.login-logo span{color:var(--cyan)}
.login-sub{font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:.1em}
.login-body{background:var(--bg2);padding:26px}
.boot-text{font-size:12px;color:var(--text-dim);margin-bottom:22px;line-height:2}
.boot-text .g{color:var(--green)}.boot-text .c{color:var(--cyan)}
.field{margin-bottom:16px}
.field label{display:block;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim);margin-bottom:6px}
.field input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--green);font-family:'Share Tech Mono',monospace;font-size:14px;padding:10px 14px;border-radius:4px;outline:none;transition:border-color .2s}
.field input::placeholder{color:rgba(57,255,110,.25)}
.field input:focus{border-color:var(--border-hi);box-shadow:0 0 8px rgba(57,255,110,.1)}
.login-btn{width:100%;background:none;border:1px solid var(--green);color:var(--green);font-family:'VT323',monospace;font-size:24px;padding:10px;border-radius:4px;cursor:pointer;letter-spacing:.1em;text-shadow:0 0 8px var(--green);box-shadow:0 0 12px rgba(57,255,110,.1);transition:all .2s;margin-top:4px}
.login-btn:hover{background:var(--green-faint);box-shadow:0 0 24px rgba(57,255,110,.2)}
.login-err{font-size:11px;color:var(--red);margin-top:12px;display:none}
.login-footer{font-size:10px;color:var(--text-dim);margin-top:16px;text-align:center}
.login-footer a{color:var(--green-dim);text-decoration:none}
.login-footer a:hover{color:var(--green)}

</style>

function startClock(){
  var el=document.getElementById('clock');
  if(!el)return;
  function tick(){var n=new Date();el.textContent=[n.getHours(),n.getMinutes(),n.getSeconds()].map(function(x){return String(x).padStart(2,'0')}).join(':');}
  tick();setInterval(tick,1000);
}

function gcol(l){return{A:'var(--green)',B:'var(--cyan)',C:'var(--yellow)',D:'var(--amber)',F:'var(--red)'}[l[0]]||'var(--green)';}

function pill(s){
  var m={graded:'<span class="pill green">graded</span>',missing:'<span class="pill red">missing</span>',upcoming:'<span class="pill cyan">upcoming</span>',late:'<span class="pill amber">late</span>',present:'<span class="pill green">present</span>',absent:'<span class="pill red">absent</span>',tardy:'<span class="pill amber">tardy</span>',excused:'<span class="pill yellow">excused</span>'};
  return m[s]||('<span class="pill">'+s+'</span>');
}

function scol(p){
  if(p>=90)return'var(--green)';if(p>=80)return'var(--cyan)';if(p>=70)return'var(--yellow)';if(p>=60)return'var(--amber)';return'var(--red)';
}

function daysUntil(d){
  var diff=Math.ceil((new Date(d)-new Date())/86400000);
  if(diff<0)return Math.abs(diff)+'d ago';if(diff===0)return'today';return'in '+diff+'d';
}

function stripeClass(lc){return{A:'sg',B:'sc',C:'sy',D:'sa',F:'sr'}[lc]||'sg';}

function navHTML(active){
  var pages=[
    {href:'index.html',label:'Grades',badge:null},
    {href:'assignments.html',label:'Assignments',badge:null},
    {href:'schedule.html',label:'Schedule',badge:null},
    {href:'attendance.html',label:'Attendance',badge:null},
    {href:'email.html',label:'Email',badge:'3',red:true},
    {href:'notifications.html',label:'Notifications',badge:'3',red:true},
    {href:'transcript.html',label:'Transcript',badge:null},
  ];
  var html='<div class="nav-label">navigate</div>';
  pages.forEach(function(p){
    html+='<a href="'+p.href+'" class="nav-item'+(p.href===active?' active':'')+'"><span class="prefix">&gt;</span> '+p.label+(p.badge?'<span class="badge'+(p.red?' red':'')+'">'+p.badge+'</span>':'')+'</a>';
  });
  html+='<div class="nav-divider"></div><div class="nav-label">account</div>';
  html+='<a href="https://scotch.quest" class="nav-item"><span class="prefix">~/</span> scotch.quest</a>';
  html+='<a href="login.html" class="nav-item"><span class="prefix">~/</span> logout</a>';
  return html;
}

function topbarHTML(crumb){
  var u=PS.student.username;
  var unread=PS.notifications.filter(function(n){return!n.read;}).length;
  return '<header class="topbar"><div class="topbar-left"><a href="https://scotch.quest" class="topbar-logo">scotch.<span>quest</span></a><div class="topbar-crumb"><a href="https://scotch.quest">~</a><span>/</span><a href="index.html">grades</a>'+(crumb?'<span>/</span><span>'+crumb+'</span>':'')+'</div></div><div class="topbar-right"><span class="topbar-time" id="clock">--:--:--</span><a href="notifications.html" class="notif-btn">[ notifs'+(unread?'<span class="notif-dot"></span>':'')+' ]</a><a href="index.html" class="topbar-user"><span class="dot"></span><span>'+u+'</span></a></div></header>';
}

document.getElementById('uname').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('pw').focus();});
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function doLogin(){
  var u=document.getElementById('uname').value.trim();
  var p=document.getElementById('pw').value;
  if(u&&p){
    sessionStorage.setItem('gsq_user',u);
    window.location.href='index.html';
  }else{
    document.getElementById('err').style.display='block';
  }
}
if(sessionStorage.getItem('gsq_user'))window.location.href='index.html';
